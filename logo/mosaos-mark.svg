<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MosaOS logo mark">
  <title>MosaOS</title>
  <!-- Mark: helle Kacheln mit dezentem Muster + 1 Swiss-rote Kachel -->
  <defs>
    <pattern id="moTileSite" width="15" height="15" patternUnits="userSpaceOnUse">
      <rect width="15" height="15" fill="#F1F3F8"/>
      <text x="0.6" y="7" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="#1B2230" opacity="0.22">MO</text>
      <text x="8.1" y="14.5" font-family="Arial, sans-serif" font-size="7" font-weight="700" fill="#1B2230" opacity="0.22">MO</text>
    </pattern>
  </defs>
  <rect x="6"  y="6"  width="24" height="24" rx="5" fill="url(#moTileSite)"/>
  <rect x="34" y="6"  width="24" height="24" rx="5" fill="url(#moTileSite)"/>
  <rect x="6"  y="34" width="24" height="24" rx="5" fill="url(#moTileSite)"/>
  <g>
    <rect x="34" y="34" width="24" height="24" rx="5" fill="#DA291C"/>
    <rect x="40" y="44" width="12" height="4" fill="#FFFFFF"/>
    <rect x="44" y="40" width="4"  height="12" fill="#FFFFFF"/>
  </g>
</svg>
